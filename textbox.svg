<svg xmlns="http://www.w3.org/2000/svg" width="600" height="140" viewBox="0 0 600 140">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Faustina:wght@400;700&amp;display=swap');
    </style>
  </defs>

  <!-- Outer border -->
  <rect x="4" y="4" width="592" height="132" rx="4" ry="4" fill="none" stroke="#2d1b4e" stroke-width="2"/>

  <!-- Inner background -->
  <rect x="8" y="8" width="584" height="124" rx="2" ry="2" fill="#0a0010" opacity="0.95"/>

  <!-- Name tag background -->
  <rect x="20" y="16" width="80" height="28" rx="2" ry="2" fill="#1a0033" stroke="#7c4dff" stroke-width="1"/>

  <!-- Name text -->
  <text x="60" y="35" font-family="'Faustina', serif" font-size="15" font-weight="700" fill="#b388ff" text-anchor="middle">Ashley</text>

  <!-- Dialogue text -->
  <text x="30" y="80" font-family="'Faustina', serif" font-size="18" fill="#e0d6f0">hello</text>

  <!-- Choice arrow -->
  <text x="50" y="115" font-family="'Faustina', serif" font-size="14" fill="#7c4dff">&#9656;</text>
  <text x="65" y="115" font-family="'Faustina', serif" font-size="14" fill="#e0d6f0">Continue</text>

  <!-- Decorative corner marks -->
  <line x1="12" y1="12" x2="30" y2="12" stroke="#2d1b4e" stroke-width="1"/>
  <line x1="12" y1="12" x2="12" y2="30" stroke="#2d1b4e" stroke-width="1"/>

  <line x1="570" y1="12" x2="588" y2="12" stroke="#2d1b4e" stroke-width="1"/>
  <line x1="588" y1="12" x2="588" y2="30" stroke="#2d1b4e" stroke-width="1"/>

  <line x1="12" y1="128" x2="30" y2="128" stroke="#2d1b4e" stroke-width="1"/>
  <line x1="12" y1="110" x2="12" y2="128" stroke="#2d1b4e" stroke-width="1"/>

  <line x1="570" y1="128" x2="588" y2="128" stroke="#2d1b4e" stroke-width="1"/>
  <line x1="588" y1="110" x2="588" y2="128" stroke="#2d1b4e" stroke-width="1"/>
</svg>
