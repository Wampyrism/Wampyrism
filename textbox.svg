<svg xmlns="http://www.w3.org/2000/svg" width="550" height="100" viewBox="0 0 550 100">
  <!-- Outer grungy border -->
  <rect x="2" y="2" width="546" height="96" rx="3" ry="3" fill="#2a2a2a" opacity="0.5"/>

  <!-- Main dark box -->
  <rect x="5" y="5" width="540" height="90" rx="2" ry="2" fill="#1e1e1e"/>

  <!-- Inner subtle border -->
  <rect x="5" y="5" width="540" height="90" rx="2" ry="2" fill="none" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Name text - purple, centered -->
  <text x="275" y="35" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#b388ff" text-anchor="middle">Wampyr</text>

  <!-- Dialogue text - cream, centered, in quotes -->
  <text x="275" y="62" font-family="Georgia, serif" font-size="14" fill="#e0d8cc" text-anchor="middle">"hello"</text>

  <!-- Down triangle - bottom center -->
  <polygon points="270,82 275,88 280,82" fill="#e0d8cc" opacity="0.6"/>
</svg>
